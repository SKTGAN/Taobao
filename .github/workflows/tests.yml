name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -p "test_*.py" -v

